<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Figma Embed Viewer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f5f5f5;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .embed-container {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        iframe {
            width: 100%;
            height: 600px;
            border: none;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Figma Design Embed</h1>
        <div class="embed-container" id="embedContainer"></div>
    </div>

    <script>
        function extractFileIdFromUrl(url) {
            // Extract file ID from Figma URL
            const match = url.match(/file\/([a-zA-Z0-9]+)/);
            return match ? match[1] : null;
        }

        function embedFigmaDesign(figmaUrl) {
            const fileId = extractFileIdFromUrl(figmaUrl);
            
            if (!fileId) {
                console.error('Invalid Figma URL');
                return;
            }

            const embedUrl = `https://www.figma.com/embed?embed_host=share&url=${encodeURIComponent(figmaUrl)}`;
            const container = document.getElementById('embedContainer');
            container.innerHTML = `<iframe src="${embedUrl}"></iframe>`;
        }

        // Usage: embedFigmaDesign('https://www.figma.com/file/...');
        // Replace with your actual Figma link
        embedFigmaDesign('YOUR_FIGMA_URL_HERE');
    </script>
</body>
</html>
